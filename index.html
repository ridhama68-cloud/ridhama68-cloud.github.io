<title>Reactivify Lead Console</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

  body { -webkit-tap-highlight-color: transparent; }

  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

<body class="bg-slate-50 text-slate-800">
<div id="root"></div>

<script id="app-code" type="text/plain">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

/* ================== CONFIG ================== */
const API_URL = "https://script.google.com/macros/s/AKfycbyiR6uKYWUA9dFhRwAxA0AOMyTEU4HF6SvPIom7N7X-JtscmWF0eHX57T5_kXxutW7J/exec";

const OUTCOMES = [
  "Not Answering","Interested","Not Interested",
  "Meeting Booked","Schedule Follow-up","Landed","Dumped"
];
const CONVO_OUTCOMES = ["Interested","Not Interested","Landed"];

/* ================== API ================== */
async function apiGet(action){ const r = await fetch(API_URL + "?action=" + action); return r.json(); }
async function apiPost(payload){
  const r = await fetch(API_URL, { method:"POST", headers:{ "Content-Type":"text/plain;charset=utf-8" }, body:JSON.stringify(payload) });
  return r.json();
}

/* ================== CSV ================== */
function parseCSV(text){
  const rows=[]; let cur=[], field="", inQ=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(inQ){ if(c==='"'&&text[i+1]==='"'){field+='"';i++;} else if(c==='"'){inQ=false;} else field+=c; }
    else { if(c==='"')inQ=true; else if(c===","){cur.push(field);field="";}
      else if(c==="\n"){cur.push(field);rows.push(cur);cur=[];field="";}
      else if(c==="\r"){} else field+=c; } }
  if(field.length||cur.length){cur.push(field);rows.push(cur);}
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}
function normHeader(h){ return String(h).toLowerCase().replace(/[_\s]+/g,""); }
function mapHeaders(headers){
  const map={};
  headers.forEach((h,i)=>{ const n=normHeader(h);
    if(["practicename","title","name","businessname"].includes(n)) map.name=i;
    else if(["phone","phonenumber","mobile","contact"].includes(n)) map.phone=i;
    else if(["email","emailaddress"].includes(n)) map.email=i;
    else if(["city","locality","area","address"].includes(n)&&map.city===undefined) map.city=i;
    else if(["rating","stars","score"].includes(n)) map.rating=i;
    else if(["reviews","reviewscount","reviewcount","totalreviews","reviewsnumber"].includes(n)) map.reviews=i;
    else if(["clinic","clinicname"].includes(n)) map.clinic=i; });
  return map;
}
function csvToLeads(text, cityOverride){
  const rows=parseCSV(text); if(rows.length<2) return [];
  const m=mapHeaders(rows[0]);
  return rows.slice(1).map(r=>({
    Name: m.name!==undefined?r[m.name]:"",
    Clinic: m.clinic!==undefined?r[m.clinic]:(m.name!==undefined?r[m.name]:""),
    Phone: m.phone!==undefined?r[m.phone]:"",
    Email: m.email!==undefined?r[m.email]:"",
    City: cityOverride || (m.city!==undefined?r[m.city]:""),
    Rating: m.rating!==undefined?r[m.rating]:"",
    Reviews: m.reviews!==undefined?r[m.reviews]:"",
    Status:"New"
  })).filter(l=>l.Name||l.Phone);
}

/* ================== HELPERS ================== */
function num(v){ const n=parseFloat(String(v).replace(/[^\d.]/g,"")); return isNaN(n)?0:n; }
function digits(v){ return String(v||"").replace(/\D/g,""); }
function waNumber(v){ const d=digits(v); return d.length===10?"91"+d:d; }
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function pad2(n){ return String(n).padStart(2,"0"); }
function nowStamp(){ return new Date().toLocaleString("en-IN",{dateStyle:"medium",timeStyle:"short"}); }

// Collapse scraper sub-town / locality names into their major metro.
const METRO_KEYWORDS = {
  "Delhi": ["delhi","saket","dwarka","rohini","karol bagh","lajpat","hauz khas","connaught","nehru place","pitampura","janakpuri","vasant","rajouri","preet vihar","mayur vihar","okhla","kalkaji","paschim vihar","shalimar bagh","punjabi bagh","greater kailash"],
  "Noida": ["noida","greater noida"],
  "Ghaziabad": ["ghaziabad","indirapuram","vaishali","raj nagar","kaushambi"],
  "Gurgaon": ["gurgaon","gurugram","dlf","udyog vihar","sohna"],
  "Faridabad": ["faridabad"],
  "Mumbai": ["mumbai","bombay","andheri","bandra","borivali","dadar","thane","powai","goregaon","malad","kandivali","juhu","chembur","vashi","navi mumbai","mulund","ghatkopar"],
  "Bangalore": ["bangalore","bengaluru","koramangala","indiranagar","whitefield","jayanagar","hsr","marathahalli","btm","electronic city","hebbal","yelahanka","rajajinagar","malleshwaram","jp nagar","banashankari"],
  "Pune": ["pune","hinjewadi","kothrud","hadapsar","viman nagar","wakad","baner","kharadi"],
  "Hyderabad": ["hyderabad","gachibowli","madhapur","kondapur","hitech","secunderabad","kukatpally","banjara hills","jubilee hills"],
  "Chennai": ["chennai","adyar","velachery","anna nagar","t nagar","tambaram","porur"],
  "Kolkata": ["kolkata","salt lake","howrah","behala","new town"]
};
const METROS = Object.keys(METRO_KEYWORDS);
function metroOf(v){
  const s=String(v||"").trim().toLowerCase();
  if(!s) return "Unsorted";
  for(let mi=0; mi<METROS.length; mi++){
    const metro=METROS[mi];
    if(METRO_KEYWORDS[metro].some(function(k){ return s.indexOf(k)>=0; })) return metro;
  }
  return String(v).trim().replace(/\b\w/g, function(c){ return c.toUpperCase(); });
}
function cityGroup(v){ return metroOf(v); }

// Parse a lead's date + time into a local Date (handles YYYY-MM-DD + "18:00"/"6:00 PM")
function leadDateTime(dateVal, timeVal){
  if(!dateVal) return null;
  let d;
  const md=String(dateVal).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(md) d=new Date(+md[1], +md[2]-1, +md[3]); else { d=new Date(dateVal); if(isNaN(d)) return null; }
  let hh=0,mm=0;
  if(timeVal){ const m=String(timeVal).match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
    if(m){ hh=+m[1]; mm=+m[2]; const ap=(m[3]||"").toUpperCase();
      if(ap==="PM"&&hh<12)hh+=12; if(ap==="AM"&&hh===12)hh=0; } }
  d.setHours(hh,mm,0,0); return d;
}
function fmtCountdown(ms){
  if(ms<=0) return "now";
  const m=Math.floor(ms/60000), h=Math.floor(m/60), d=Math.floor(h/24);
  if(d>0) return d+"d "+(h%24)+"h";
  if(h>0) return h+"h "+(m%60)+"m";
  return m+"m";
}
function fmtWhen(d){ return d.toLocaleString("en-IN",{weekday:"short",day:"numeric",month:"short",hour:"numeric",minute:"2-digit"}); }

// All upcoming meetings + follow-ups from a set of leads, soonest first.
function upcomingEvents(leads){
  const now=Date.now(); const out=[];
  leads.forEach(l=>{
    if(/booked/i.test(l.Status||"")){
      const at=leadDateTime(l["Meeting Date"], l["Meeting Time"]);
      if(at && at.getTime()>now-60*60000) out.push({when:at,type:"Meeting",lead:l});
    }
    if(!/dumped|landed/i.test(l.Status||"")){
      const fu=leadDateTime(l["Followup Date"], l["Followup Time"]);
      if(fu && fu.getTime()>now-60*60000) out.push({when:fu,type:"Follow-up",lead:l});
    }
  });
  return out.sort((a,b)=>a.when-b.when);
}

// Google Calendar "add event" link (manual backup to the auto-booking).
function gcalStamp(d){ return d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+"T"+pad2(d.getHours())+pad2(d.getMinutes())+"00"; }
function gcalUrl(lead){
  const at=leadDateTime(lead["Meeting Date"], lead["Meeting Time"]); if(!at) return "";
  const end=new Date(at.getTime()+30*60000);
  const text=encodeURIComponent("Reactivify: "+(lead.Clinic||lead.Name||"Meeting"));
  const details=encodeURIComponent("Phone: "+(lead.Phone||"")+" · Assigned: "+(lead["Assigned To"]||""));
  return "https://calendar.google.com/calendar/render?action=TEMPLATE&text="+text+"&dates="+gcalStamp(at)+"/"+gcalStamp(end)+"&details="+details;
}

/* ================== NOTIFICATIONS ================== */
function useNotifier(events){
  const fired = useRef({});
  useEffect(()=>{
    if(!("Notification" in window)) return;
    const id=setInterval(()=>{
      if(Notification.permission!=="granted") return;
      const now=Date.now();
      events.forEach(ev=>{
        const mins=(ev.when.getTime()-now)/60000;
        [30,15].forEach(th=>{
          const key=ev.lead.ID+"_"+ev.type+"_"+th;
          if(mins<=th && mins>th-2 && !fired.current[key]){
            fired.current[key]=true;
            try{ new Notification("Reactivify — "+ev.type+" soon", {
              body:(ev.lead.Clinic||ev.lead.Name||"Lead")+" in ~"+Math.max(1,Math.round(mins))+" min" }); }catch(e){}
          }
        });
      });
    }, 60000);
    return ()=>clearInterval(id);
  }, [events]);
}

/* ================== ROOT ================== */
function App(){
  const [user,setUser]=useState(null);
  const [leads,setLeads]=useState([]);
  const [interns,setInterns]=useState(()=>{ try{ const c=localStorage.getItem("reactivify_interns"); return c?JSON.parse(c):[]; }catch(e){ return []; } });
  const [stats,setStats]=useState({});
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState("");
  const [notifPerm,setNotifPerm]=useState(("Notification" in window)?Notification.permission:"unsupported");

  const configMissing = API_URL.indexOf("PASTE_YOUR")===0;
  const notify=(m)=>{ setToast(m); setTimeout(()=>setToast(""),2800); };

  const refresh=useCallback(async()=>{
    if(configMissing) return;
    setLoading(true);
    try{ const res=await apiGet("list");
      if(res.ok){ setLeads(res.leads||[]); setInterns(res.interns||[]);
        try{ localStorage.setItem("reactivify_interns", JSON.stringify(res.interns||[])); }catch(e){} }
      const st=await apiGet("getStats"); if(st.ok) setStats(st.stats||{}); }
    catch(e){ notify("Load failed: "+e); }
    setLoading(false);
  },[configMissing]);

  useEffect(()=>{ if(user) refresh(); },[user,refresh]);
  // keep data fresh so countdowns/notifications stay accurate
  useEffect(()=>{ if(!user) return; const id=setInterval(refresh,120000); return ()=>clearInterval(id); },[user,refresh]);

  function askNotif(){
    if(!("Notification" in window)) return;
    Notification.requestPermission().then(p=>setNotifPerm(p));
  }
  useEffect(()=>{ if(user && notifPerm==="default") askNotif(); },[user]);

  if(!user) return <Login interns={interns} onPick={setUser} onNeedInterns={refresh} configMissing={configMissing}/>;

  const isAdmin = user==="Team";
  const myLeads = isAdmin ? leads : leads.filter(l=>String(l["Assigned To"]||"").trim().toLowerCase()===String(user).toLowerCase());
  const events = upcomingEvents(myLeads);

  return (
    <div className="min-h-screen">
      <Header user={user} isAdmin={isAdmin} onSwitch={()=>setUser(null)} onRefresh={refresh}
        loading={loading} notifPerm={notifPerm} onEnableNotif={askNotif}/>
      {configMissing &&
        <div className="bg-amber-100 text-amber-900 text-sm px-4 py-2 text-center">⚠ API_URL not set.</div>}
      <NotifierMount events={events}/>
      <CountdownPill events={events}/>
      {isAdmin
        ? <AdminView leads={leads} interns={interns} stats={stats} refresh={refresh} notify={notify}/>
        : <InternView user={user} leads={leads} stats={stats} refresh={refresh} notify={notify}/>}
      {toast && <Toast msg={toast}/>}
    </div>
  );
}
function NotifierMount({events}){ useNotifier(events); return null; }

function Toast({msg}){ return <div className="fixed bottom-4 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-sm px-4 py-2 rounded-full shadow-lg z-50">{msg}</div>; }

function Header({user,isAdmin,onSwitch,onRefresh,loading,notifPerm,onEnableNotif}){
  return (
    <div className="sticky top-0 z-40 bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
      <div className="flex items-center gap-2">
        <span className="text-lg font-bold text-indigo-600">Reactivify</span>
        <span className="text-xs bg-slate-100 px-2 py-0.5 rounded-full">{isAdmin?"Admin":"Intern"}: {user}</span>
      </div>
      <div className="flex items-center gap-2">
        {notifPerm!=="granted" && notifPerm!=="unsupported" &&
          <button onClick={onEnableNotif} className="text-sm px-3 py-1.5 rounded-lg bg-amber-100 text-amber-800">🔔 Enable alerts</button>}
        <button onClick={onRefresh} className="text-sm px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200">{loading?"…":"↻"}</button>
        <button onClick={onSwitch} className="text-sm px-3 py-1.5 rounded-lg bg-slate-100 hover:bg-slate-200">Switch</button>
      </div>
    </div>
  );
}

/* ================== COUNTDOWN PILL ================== */
function CountdownPill({events}){
  const [,setTick]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>setTick(t=>t+1),30000); return ()=>clearInterval(id); },[]);
  if(!events.length) return null;
  const next=events[0];
  const ms=next.when.getTime()-Date.now();
  const soon=ms<30*60000;
  return (
    <div className={"px-4 py-2 text-sm text-center "+(soon?"bg-red-600 text-white":"bg-indigo-600 text-white")}>
      ⏱ Next {next.type.toLowerCase()}: <b>{next.lead.Clinic||next.lead.Name}</b> — {fmtWhen(next.when)} · in <b>{fmtCountdown(ms)}</b>
      {events.length>1 && <span className="opacity-80"> · +{events.length-1} more</span>}
    </div>
  );
}

/* ================== LOGIN ================== */
function Login({interns,onPick,onNeedInterns,configMissing}){
  useEffect(()=>{ if(!configMissing) onNeedInterns(); },[]);
  const list = ["Team", ...interns.map(i=>i.name)];
  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6">
      <div className="text-3xl font-bold text-indigo-600 mb-1">Reactivify</div>
      <div className="text-slate-500 mb-8">Lead Console — pick your name</div>
      <div className="grid grid-cols-2 gap-3 w-full max-w-sm">
        {list.map(n=>(
          <button key={n} onClick={()=>onPick(n)}
            className={"py-4 rounded-2xl font-semibold shadow-sm border "+(n==="Team"?"bg-indigo-600 text-white border-indigo-600":"bg-white border-slate-200 hover:border-indigo-400")}>
            {n}{n==="Team" && <div className="text-xs font-normal opacity-80">Admin</div>}
          </button>
        ))}
      </div>
      {interns.length===0 && <div className="text-xs text-slate-400 mt-4">Loading team…</div>}
    </div>
  );
}

/* ============ QUICK SCHEDULE (book meeting / follow-up) ============ */
function QuickSchedule({leads,user,refresh,notify}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const [leadId,setLeadId]=useState("");
  const [manualLead,setManualLead]=useState(null);
  const [creating,setCreating]=useState(false);
  const [nc,setNc]=useState({clinic:"",name:"",phone:"",email:""});
  const [kind,setKind]=useState("meeting");            // meeting | followup
  const [dt,setDt]=useState({date:todayISO(),time:"11:00"});
  const [email,setEmail]=useState("");
  const [saving,setSaving]=useState(false);

  const matches = (q.trim()
    ? leads.filter(l=>((l.Clinic||"")+" "+(l.Name||"")+" "+(l.Phone||"")+" "+(l.City||"")).toLowerCase().indexOf(q.trim().toLowerCase())>=0)
    : leads).slice(0,25);
  const sel = leads.find(l=>String(l.ID)===String(leadId)) || (manualLead && String(manualLead.ID)===String(leadId) ? manualLead : null);

  function reset(){ setLeadId(""); setManualLead(null); setCreating(false); setQ(""); setNc({clinic:"",name:"",phone:"",email:""}); setEmail(""); }

  async function createLead(){
    if(!nc.clinic.trim() && !nc.name.trim()){ notify("Enter a clinic or doctor name"); return; }
    setSaving(true);
    const lead={Clinic:nc.clinic.trim(), Name:nc.name.trim(), Phone:nc.phone.trim(), Email:nc.email.trim(), Status:"New", "Assigned To": (user==="Team"?"Team":user)};
    const res=await apiPost({action:"upsert", lead});
    setSaving(false);
    if(res.ok && res.lead){ setManualLead(res.lead); setLeadId(res.lead.ID); setEmail(res.lead.Email||""); setCreating(false); refresh(); }
    else notify("Create failed: "+(res.error||"unknown"));
  }

  async function save(){
    if(!leadId){ notify("Pick or create a lead first"); return; }
    setSaving(true);
    const patch = kind==="meeting"
      ? {ID:leadId, Email:email, Status:"Meeting Booked", "Meeting Date":dt.date, "Meeting Time":dt.time}
      : {ID:leadId, Email:email, Status:"Schedule Follow-up", "Followup Date":dt.date, "Followup Time":dt.time, "Followup Sent":""};
    const res=await apiPost({action:"upsert", lead:patch});
    setSaving(false);
    if(res.ok){ notify(kind==="meeting"?"Meeting booked ✓":"Follow-up scheduled ✓"); setOpen(false); reset(); refresh(); }
    else notify("Failed: "+res.error);
  }

  if(!open) return <button onClick={()=>setOpen(true)} className="px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium">＋ Book meeting / follow-up</button>;
  return (
    <div className="bg-white rounded-2xl border border-indigo-200 p-4 space-y-3 shadow-sm">
      <div className="flex items-center justify-between">
        <div className="font-semibold">Log a meeting or follow-up</div>
        <button onClick={()=>{setOpen(false);reset();}} className="text-slate-400 text-lg leading-none">✕</button>
      </div>
      <div className="flex gap-1 bg-slate-100 rounded-full p-1 w-max">
        <button onClick={()=>setKind("meeting")} className={"px-3 py-1 rounded-full text-sm "+(kind==="meeting"?"bg-white shadow":"")}>Meeting</button>
        <button onClick={()=>setKind("followup")} className={"px-3 py-1 rounded-full text-sm "+(kind==="followup"?"bg-white shadow":"")}>Follow-up</button>
      </div>

      {sel
        ? <div className="flex items-center justify-between bg-slate-50 rounded-lg px-3 py-2">
            <div><div className="font-medium text-sm">{sel.Clinic||sel.Name}</div><div className="text-xs text-slate-400">{sel.Phone} · {sel.City||""}</div></div>
            <button onClick={reset} className="text-xs text-indigo-600">change</button>
          </div>
        : creating
          ? <div className="space-y-2 border rounded-lg p-3 bg-slate-50">
              <div className="text-sm font-medium">New clinic</div>
              <input value={nc.clinic} onChange={e=>setNc({...nc,clinic:e.target.value})} placeholder="Clinic name" className="w-full border rounded-lg px-3 py-2 text-sm"/>
              <input value={nc.name} onChange={e=>setNc({...nc,name:e.target.value})} placeholder="Doctor name" className="w-full border rounded-lg px-3 py-2 text-sm"/>
              <input value={nc.phone} onChange={e=>setNc({...nc,phone:e.target.value})} placeholder="Phone number (e.g. 98765 43210)" className="w-full border rounded-lg px-3 py-2 text-sm"/>
              <input type="email" value={nc.email} onChange={e=>setNc({...nc,email:e.target.value})} placeholder="Doctor email" className="w-full border rounded-lg px-3 py-2 text-sm"/>
              <div className="flex gap-2">
                <button onClick={createLead} disabled={saving} className="flex-1 py-2 rounded-lg bg-indigo-600 text-white text-sm disabled:opacity-40">{saving?"Creating…":"Create & select"}</button>
                <button onClick={()=>setCreating(false)} className="px-3 py-2 rounded-lg bg-white border text-sm">Cancel</button>
              </div>
            </div>
          : <div>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search a lead by clinic / name / phone" className="w-full border rounded-lg px-3 py-2 text-sm"/>
              <div className="mt-1 max-h-52 overflow-y-auto no-scrollbar border rounded-lg divide-y divide-slate-100">
                {matches.map(l=>(
                  <button key={l.ID} onClick={()=>{setLeadId(l.ID);setEmail(l.Email||"");}} className="w-full text-left px-3 py-2 hover:bg-slate-50">
                    <div className="font-medium text-sm">{l.Clinic||l.Name}</div>
                    <div className="text-xs text-slate-400">{l.Phone} · {l.City} · {l["Assigned To"]||"unassigned"}</div>
                  </button>
                ))}
                {matches.length===0 && <div className="px-3 py-2 text-sm text-slate-400">No matching leads — create it below.</div>}
              </div>
              <div className="text-[11px] text-slate-400 mt-1">{leads.length} leads · type to search all of them</div>
              <button onClick={()=>{setCreating(true);setNc({clinic:q,name:"",phone:"",email:""});}} className="mt-2 w-full py-2 rounded-lg border border-dashed border-indigo-300 text-indigo-600 text-sm font-medium">＋ Create new clinic</button>
            </div>}

      {sel &&
        <div>
          <label className="text-xs font-medium text-slate-600">Doctor email <span className="text-red-500">*required</span></label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="doctor@clinic.com"
            className={"w-full border rounded-lg px-3 py-2 text-sm "+(email?"border-slate-200":"border-red-300 bg-red-50")}/>
          <div className="text-[11px] text-slate-400 mt-0.5">Needed to send the doctor the meeting link — you can still save without it.</div>
        </div>}

      {sel &&
        <div className="flex gap-2">
          <input type="date" value={dt.date} onChange={e=>setDt({...dt,date:e.target.value})} className="border rounded-lg px-2 py-1 text-sm flex-1"/>
          <input type="time" value={dt.time} onChange={e=>setDt({...dt,time:e.target.value})} className="border rounded-lg px-2 py-1 text-sm flex-1"/>
        </div>}
      {sel &&
        <button onClick={save} disabled={saving||!leadId} className="w-full py-2 rounded-lg bg-indigo-600 text-white text-sm font-semibold disabled:opacity-40">
          {saving?"Saving…":(kind==="meeting"?"Book meeting":"Schedule follow-up")}
        </button>}
    </div>
  );
}

/* ================== ADMIN ================== */
function AdminView({leads,interns,stats,refresh,notify}){
  const [section,setSection]=useState("dashboard");    // dashboard | leads | team
  const [sortBy,setSortBy]=useState("reviews");
  const [cityFilter,setCityFilter]=useState("All");
  const [busy,setBusy]=useState(false);
  const [importReport,setImportReport]=useState(null);
  const [pendingCity,setPendingCity]=useState("");
  const [search,setSearch]=useState("");
  const [assignAllWho,setAssignAllWho]=useState("");
  const fileRef=useRef();
  const internNames = interns.length?interns.map(i=>i.name):["Priya","Raj","Ananya"];

  const cities = useMemo(()=>{
    const set={}; leads.forEach(l=>{ const c=cityGroup(l.City); set[c]=(set[c]||0)+1; });
    return Object.keys(set).sort();
  },[leads]);

  const q=search.trim().toLowerCase();
  const shown = leads.filter(l=>{
    if(cityFilter!=="All" && cityGroup(l.City)!==cityFilter) return false;
    if(q){ const hay=((l.Name||"")+" "+(l.Clinic||"")+" "+(l.Phone||"")+" "+(l.City||"")).toLowerCase(); if(hay.indexOf(q)<0) return false; }
    return true;
  });
  const sorted = useMemo(()=>sortLeads(shown,sortBy),[shown,sortBy]);

  async function assignAllShown(){
    if(!assignAllWho){ notify("Pick a team member"); return; }
    const rows=sorted.map(l=>l._row).filter(Boolean);
    if(!rows.length){ notify("Nothing to assign"); return; }
    if(!confirm("Assign all "+rows.length+" shown leads to "+assignAllWho+"?")) return;
    setBusy(true);
    const res=await apiPost({action:"bulkField", rows, field:"Assigned To", value:assignAllWho});
    setBusy(false); notify(res.ok?("Assigned "+res.updated+" to "+assignAllWho):"Failed"); refresh();
  }

  async function onFile(e){
    const f=e.target.files[0]; if(!f) return;
    const text=await f.text();
    const parsed=csvToLeads(text, pendingCity.trim());
    if(!parsed.length){ notify("No valid rows found"); fileRef.current.value=""; return; }
    setBusy(true);
    const res=await apiPost({action:"bulkImport", leads:parsed});
    setBusy(false); fileRef.current.value="";
    if(res.ok){ setImportReport({imported:res.imported, skipped:res.skipped, overlaps:res.overlaps||[], parsed});
      notify("Imported "+res.imported+" new · "+res.skipped+" overlaps"); }
    else notify("Import failed: "+res.error);
    refresh();
  }
  async function overrideExisting(){
    if(!importReport) return; setBusy(true);
    const res=await apiPost({action:"bulkImport", leads:importReport.parsed, updateExisting:true});
    setBusy(false); notify(res.ok?("Refreshed "+res.skipped+" existing"):"Failed"); setImportReport(null); refresh();
  }
  async function autoAssign(){
    setBusy(true); const res=await apiPost({action:"bulkAssign", mode:"auto"}); setBusy(false);
    notify(res.ok?("Assigned "+res.assigned+" leads"):"Assign failed"); refresh();
  }
  async function recategorize(city){
    const rows=shown.map(l=>l._row).filter(Boolean);
    if(!rows.length||!city) return;
    setBusy(true);
    const res=await apiPost({action:"bulkField", rows, field:"City", value:city});
    setBusy(false); notify(res.ok?("Moved "+res.updated+" leads to "+city):"Failed"); setCityFilter(city); refresh();
  }
  async function clearAll(){
    const c=prompt('This permanently deletes ALL leads. Type DELETE to confirm.');
    if(c!=="DELETE"){ notify("Cancelled"); return; }
    setBusy(true); await apiPost({action:"clearAll"}); setBusy(false); notify("All leads cleared"); refresh();
  }

  const tabs=[["dashboard","📊 Dashboard"],["leads","📇 Leads"],["team","👥 Team"]];
  return (
    <div className="p-4 max-w-6xl mx-auto space-y-4">
      <div className="flex gap-1 bg-slate-100 rounded-full p-1 w-max">
        {tabs.map(([id,label])=>(
          <button key={id} onClick={()=>setSection(id)}
            className={"px-4 py-1.5 rounded-full text-sm "+(section===id?"bg-white shadow font-medium":"text-slate-600")}>{label}</button>
        ))}
      </div>

      {section==="dashboard" && <React.Fragment>
        <SummaryCards leads={leads}/>
        <TeamStats leads={leads} internNames={internNames} stats={stats}/>
        <TeamUpcoming leads={leads}/>
      </React.Fragment>}

      {section==="team" && <TeamManager interns={interns} refresh={refresh} notify={notify}/>}

      {section==="leads" && <React.Fragment>
      <QuickSchedule leads={leads} user="Team" refresh={refresh} notify={notify}/>
      <DuplicatesTool leads={leads} refresh={refresh} notify={notify}/>

      <div className="bg-white rounded-2xl border border-slate-200 p-4 space-y-3">
        <div className="flex items-center justify-between">
          <div className="font-semibold">Import & assign</div>
          <DangerMenu onClear={clearAll}/>
        </div>
        <div className="flex flex-wrap gap-2 items-center">
          <input ref={fileRef} type="file" accept=".csv" onChange={onFile} className="hidden"/>
          <select value={pendingCity} onChange={e=>setPendingCity(e.target.value)} className="border rounded-lg px-2 py-2 text-sm">
            <option value="">City for this upload… (auto from data)</option>
            {METROS.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={()=>fileRef.current.click()} className="px-3 py-2 rounded-lg bg-indigo-600 text-white text-sm">Upload CSV</button>
          <button onClick={autoAssign} className="px-3 py-2 rounded-lg bg-slate-100 text-sm">Auto-assign pool</button>
          <RangeAssign leads={sorted} internNames={internNames} onDone={refresh} notify={notify}/>
          {busy && <span className="text-indigo-500 text-sm">working…</span>}
        </div>
        <div className="flex flex-wrap gap-2 items-center">
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔎 Search name / clinic / phone / city"
            className="border rounded-lg px-3 py-2 text-sm flex-1 min-w-[220px]"/>
          <div className="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1">
            <span className="text-sm text-slate-500">Assign all {sorted.length} shown →</span>
            <select value={assignAllWho} onChange={e=>setAssignAllWho(e.target.value)} className="border rounded px-1 py-0.5 text-sm">
              <option value="">who…</option>
              {internNames.map(n=><option key={n}>{n}</option>)}
            </select>
            <button onClick={assignAllShown} className="px-2 py-0.5 rounded bg-indigo-600 text-white text-sm">Go</button>
          </div>
        </div>
        <div className="text-xs text-slate-400">Tip: pick a city before uploading so Delhi / Bangalore / Noida batches stay separate. Overlapping leads are detected and never duplicated.</div>
      </div>

      {importReport && <ImportReport report={importReport} onOverride={overrideExisting} onDismiss={()=>setImportReport(null)}/>}

      {/* City tabs */}
      <div className="flex flex-wrap gap-2">
        <CityTab label={"All ("+leads.length+")"} active={cityFilter==="All"} onClick={()=>setCityFilter("All")}/>
        {cities.map(c=>{
          const n=leads.filter(l=>cityGroup(l.City)===c).length;
          return <CityTab key={c} label={c+" ("+n+")"} active={cityFilter===c} onClick={()=>setCityFilter(c)}/>;
        })}
      </div>

      {cityFilter!=="All" &&
        <div className="flex items-center gap-2 text-sm bg-slate-50 border border-slate-200 rounded-lg px-3 py-2">
          <span className="text-slate-500">Recategorize all {shown.length} "{cityFilter}" leads →</span>
          <select value="" onChange={e=>recategorize(e.target.value)} className="border rounded px-2 py-1 text-sm">
            <option value="">choose city…</option>
            {METROS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>}

      <div className="flex items-center gap-2 text-sm">
        <span className="text-slate-500">Sort:</span>
        {["reviews","rating","internal"].map(k=>(
          <button key={k} onClick={()=>setSortBy(k)}
            className={"px-3 py-1 rounded-full "+(sortBy===k?"bg-indigo-600 text-white":"bg-slate-100")}>
            {k==="internal"?"internal rating":k}</button>
        ))}
      </div>

      <AdminLeadTable leads={sorted} internNames={internNames} refresh={refresh} notify={notify}/>
      </React.Fragment>}
    </div>
  );
}

  const total=leads.length;
  const unassigned=leads.filter(l=>!l["Assigned To"]||l["Assigned To"]==="Team").length;
  const contacted=leads.filter(l=>l.Status && l.Status!=="New").length;
  const booked=leads.filter(l=>/booked/i.test(l.Status||"")).length;
  const followups=leads.filter(l=>/follow/i.test(l.Status||"")||l["Followup Date"]).length;
  const landed=leads.filter(l=>/landed/i.test(l.Status||"")).length;
  const card=(label,val,color)=>(<div className="bg-white rounded-2xl border border-slate-200 p-4"><div className={"text-2xl font-bold "+(color||"text-slate-800")}>{val}</div><div className="text-xs text-slate-500 mt-1">{label}</div></div>);
  const byCity={}; leads.forEach(l=>{const c=cityGroup(l.City);byCity[c]=(byCity[c]||0)+1;});
  const cityRows=Object.keys(byCity).map(c=>[c,byCity[c]]).sort((a,b)=>b[1]-a[1]);
  return (
    <div className="space-y-4">
      <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
        {card("Total leads",total)}
        {card("Unassigned",unassigned,"text-amber-600")}
        {card("Contacted",contacted,"text-blue-600")}
        {card("Meetings booked",booked,"text-green-600")}
        {card("Follow-ups",followups,"text-amber-600")}
        {card("Landed (won)",landed,"text-emerald-600")}
      </div>
      <div className="bg-white rounded-2xl border border-slate-200 p-4">
        <div className="font-semibold mb-2">Leads by city</div>
        <div className="space-y-1.5">
          {cityRows.map(row=>(
            <div key={row[0]} className="flex items-center gap-2 text-sm">
              <div className="w-28 truncate">{row[0]}</div>
              <div className="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden"><div className="bg-indigo-500 h-2" style={{width:(total?row[1]/total*100:0)+"%"}}></div></div>
              <div className="w-10 text-right text-slate-500">{row[1]}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );

function DuplicatesTool({leads,refresh,notify}){
  const [busy,setBusy]=useState(false);
  function keyOf(l){ const p=String(l.Phone||"").replace(/\D/g,""); if(p) return "p:"+p.slice(-10); const n=String(l.Clinic||l.Name||"").trim().toLowerCase(); return n?"n:"+n:""; }
  const groups=useMemo(()=>{
    const m={}; leads.forEach(l=>{ const k=keyOf(l); if(!k) return; (m[k]=m[k]||[]).push(l); });
    return Object.keys(m).map(k=>m[k]).filter(g=>g.length>1);
  },[leads]);
  const dupCount=groups.reduce((a,g)=>a+(g.length-1),0);
  function score(l){ let s=0; if(/booked|landed/i.test(l.Status||""))s+=5; if(l.Notes)s+=3; if(l["Assigned To"]&&l["Assigned To"]!=="Team")s+=2; if(l["Followup Date"])s+=2; if(l.Email)s+=1; return s; }
  async function removeAll(){
    if(!dupCount) return;
    if(!confirm("Remove "+dupCount+" duplicate lead(s)? The best record in each group (meeting/notes/assignment) is kept.")) return;
    setBusy(true);
    for(let gi=0; gi<groups.length; gi++){
      const g=groups[gi].slice().sort((a,b)=>score(b)-score(a));
      for(let i=1;i<g.length;i++){ await apiPost({action:"delete", id:g[i].ID}); }
    }
    setBusy(false); notify("Removed "+dupCount+" duplicates"); refresh();
  }
  if(!groups.length) return <div className="bg-white rounded-2xl border border-slate-200 p-4 text-sm text-slate-500">✓ No duplicate leads found.</div>;
  return (
    <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 space-y-2">
      <div className="flex items-center justify-between">
        <div className="font-semibold text-amber-900">🔁 Duplicates: {groups.length} groups · {dupCount} extra record(s)</div>
        <button onClick={removeAll} disabled={busy} className="px-3 py-1.5 rounded-lg bg-amber-600 text-white text-sm disabled:opacity-40">{busy?"Removing…":"Remove duplicates"}</button>
      </div>
      <div className="max-h-40 overflow-y-auto no-scrollbar text-xs text-amber-800 space-y-0.5">
        {groups.slice(0,25).map((g,i)=><div key={i}>• {g[0].Clinic||g[0].Name} — {g.length} copies</div>)}
      </div>
      <div className="text-[11px] text-amber-700">Keeps the record with a meeting / notes / assignment; deletes the rest.</div>
    </div>
  );
}

function RangeAssign({leads,internNames,onDone,notify}){
  const [open,setOpen]=useState(false);
  const [from,setFrom]=useState(""); const [to,setTo]=useState(""); const [who,setWho]=useState(internNames[0]);
  async function go(){
    const f=parseInt(from,10), t=parseInt(to,10);
    if(!f||!t){ notify("Enter a row range"); return; }
    const rows=leads.slice(f-1,t).map(l=>l._row).filter(Boolean);
    if(!rows.length){ notify("No leads in that range"); return; }
    const res=await apiPost({action:"bulkField", rows, field:"Assigned To", value:who});
    notify(res.ok?("Assigned "+res.updated+" to "+who):"Failed"); setOpen(false); onDone();
  }
  if(!open) return <button onClick={()=>setOpen(true)} className="px-3 py-2 rounded-lg bg-slate-100 text-sm">Assign by range</button>;
  return (
    <div className="flex items-center gap-1 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1">
      <span className="text-sm">rows</span>
      <input value={from} onChange={e=>setFrom(e.target.value)} className="w-14 border rounded px-1 py-0.5 text-sm" placeholder="1"/>
      <span className="text-sm">to</span>
      <input value={to} onChange={e=>setTo(e.target.value)} className="w-14 border rounded px-1 py-0.5 text-sm" placeholder="50"/>
      <span className="text-sm">→</span>
      <select value={who} onChange={e=>setWho(e.target.value)} className="border rounded px-1 py-0.5 text-sm">
        {internNames.map(n=><option key={n}>{n}</option>)}</select>
      <button onClick={go} className="px-2 py-0.5 rounded bg-indigo-600 text-white text-sm">Go</button>
      <button onClick={()=>setOpen(false)} className="px-1 text-slate-400">✕</button>
    </div>
  );
}

function sortLeads(leads,by){
  const cp=[...leads];
  if(by==="reviews") cp.sort((a,b)=>num(b.Reviews)-num(a.Reviews));
  else if(by==="rating") cp.sort((a,b)=>num(b.Rating)-num(a.Rating));
  else if(by==="internal") cp.sort((a,b)=>num(b["Internal Rating"])-num(a["Internal Rating"]));
  return cp;
}

function EditLead({lead,onClose,refresh,notify}){
  const [f,setF]=useState({Clinic:lead.Clinic||"",Name:lead.Name||"",Phone:lead.Phone||"",Email:lead.Email||"",City:lead.City||"",Status:lead.Status||"New"});
  const [saving,setSaving]=useState(false);
  async function save(){
    setSaving(true);
    const res=await apiPost({action:"upsert", lead:Object.assign({ID:lead.ID}, f)});
    setSaving(false);
    if(res.ok){ notify("Lead updated"); onClose(); refresh(); } else notify("Failed: "+res.error);
  }
  return (
    <div className="fixed inset-0 bg-black/30 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl p-4 w-full max-w-sm space-y-2" onClick={e=>e.stopPropagation()}>
        <div className="font-semibold">Edit lead</div>
        {[["Clinic","Clinic name"],["Name","Doctor name"],["Phone","Phone"],["Email","Doctor email"],["City","City"]].map(fld=>(
          <div key={fld[0]}>
            <label className="text-[11px] text-slate-500">{fld[1]}</label>
            <input value={f[fld[0]]} onChange={e=>setF(Object.assign({},f,{[fld[0]]:e.target.value}))} className="w-full border rounded-lg px-3 py-2 text-sm"/>
          </div>
        ))}
        <div>
          <label className="text-[11px] text-slate-500">Status</label>
          <select value={f.Status} onChange={e=>setF(Object.assign({},f,{Status:e.target.value}))} className="w-full border rounded-lg px-3 py-2 text-sm">
            {["New"].concat(OUTCOMES).map(o=><option key={o}>{o}</option>)}
          </select>
        </div>
        <div className="flex gap-2 pt-1">
          <button onClick={save} disabled={saving} className="flex-1 py-2 rounded-lg bg-indigo-600 text-white text-sm disabled:opacity-40">{saving?"Saving…":"Save"}</button>
          <button onClick={onClose} className="px-3 py-2 rounded-lg bg-white border text-sm">Cancel</button>
        </div>
      </div>
    </div>
  );
}

function StatusBadge({status}){
  const s=status||"New";
  const color=/Booked/i.test(s)?"bg-green-100 text-green-700"
    :/Landed/i.test(s)?"bg-emerald-100 text-emerald-700"
    :/Interested/i.test(s)&&!/Not/i.test(s)?"bg-blue-100 text-blue-700"
    :/Dumped|Not Interested/i.test(s)?"bg-slate-200 text-slate-500"
    :/Follow/i.test(s)?"bg-amber-100 text-amber-700":"bg-slate-100 text-slate-600";
  return <span className={"px-2 py-0.5 rounded-full text-xs "+color}>{s}</span>;
}

  const [open,setOpen]=useState(interns.length===0);
  const [name,setName]=useState(""); const [email,setEmail]=useState("");
  async function add(){
    if(!name.trim()){ notify("Enter a name"); return; }
    const res=await apiPost({action:"addIntern", name:name.trim(), email:email.trim()});
    if(res.ok){ notify("Added "+name); setName(""); setEmail(""); refresh(); } else notify("Failed: "+res.error);
  }
  async function remove(n){
    if(!confirm("Remove "+n+" from the team?")) return;
    const res=await apiPost({action:"removeIntern", name:n});

  return (

          ))}
          <div className="flex flex-wrap gap-2 pt-2">
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="Name (e.g. Priya)" className="border rounded-lg px-2 py-1.5 text-sm"/>
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email — real inbox for reminders" className="border rounded-lg px-2 py-1.5 text-sm flex-1 min-w-[220px]"/>
            <button onClick={add} className="px-3 py-1.5 rounded-lg bg-indigo-600 text-white text-sm">Add member</button>
          </div>
        </div>}
    </div>
  );
}

/* ================== TEAM STATS ================== */
function TeamStats({leads,internNames,stats}){
  stats=stats||{};
  const rows=internNames.map(name=>{
    const s=stats[name]||{};
    const dials=s.dials||0, convos=s.conversations||0, meetings=s.meetings||0, followups=s.followups||0, landed=s.landed||0;
    // "Assigned" = current workload (live); the rest are real cumulative call counters.
    const assigned=leads.filter(l=>String(l["Assigned To"]||"").trim().toLowerCase()===name.toLowerCase()).length;
    return {name,assigned,dials,convos,meetings,followups,landed,
      bookingRate:dials?meetings/dials*100:0, closeRate:meetings?landed/meetings*100:0};
  });
  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-4">
      <div className="font-semibold mb-3">Team Stats</div>
      <div className="overflow-x-auto no-scrollbar">
        <table className="w-full text-sm">
          <thead className="text-slate-500 text-left"><tr>
            <th className="py-1 pr-4">Intern</th><th className="py-1 px-2">Assigned</th><th className="py-1 px-2">Dials</th><th className="py-1 px-2">Convos</th>
            <th className="py-1 px-2">Meetings</th><th className="py-1 px-2">Follow-ups</th><th className="py-1 px-2">Landed</th>
            <th className="py-1 px-2">Booking %</th><th className="py-1 px-2">Close %</th></tr></thead>
          <tbody>
            {rows.map(r=>(
              <tr key={r.name} className="border-t border-slate-100">
                <td className="py-2 pr-4 font-medium">{r.name}</td>
                <td className="py-2 px-2 text-slate-500">{r.assigned}</td>
                <td className="py-2 px-2">{r.dials}</td><td className="py-2 px-2">{r.convos}</td>
                <td className="py-2 px-2">{r.meetings}</td><td className="py-2 px-2">{r.followups}</td>
                <td className="py-2 px-2">{r.landed}</td>
                <td className="py-2 px-2">{r.bookingRate.toFixed(0)}%</td><td className="py-2 px-2">{r.closeRate.toFixed(0)}%</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="text-xs text-slate-400 mt-2">Booking % = meetings ÷ dials · Close % = landed ÷ meetings</div>
    </div>
  );
}

/* ================== TEAM UPCOMING (admin) ================== */
function TeamUpcoming({leads}){
  const [,setTick]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>setTick(t=>t+1),30000); return ()=>clearInterval(id); },[]);
  const events=upcomingEvents(leads).slice(0,12);
  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-4">
      <div className="font-semibold mb-3">Upcoming across the team</div>
      {events.length===0
        ? <div className="text-sm text-slate-400">No upcoming meetings or follow-ups.</div>
        : <div className="space-y-1">
            {events.map((ev,i)=>{
              const ms=ev.when.getTime()-Date.now();
              return (
                <div key={i} className="flex items-center justify-between text-sm border-t border-slate-100 py-1.5 first:border-0">
                  <div className="flex items-center gap-2">
                    <span className={"px-2 py-0.5 rounded-full text-xs "+(ev.type==="Meeting"?"bg-green-100 text-green-700":"bg-amber-100 text-amber-700")}>{ev.type}</span>
                    <span className="font-medium">{ev.lead.Clinic||ev.lead.Name}</span>
                    <span className="text-slate-400">· {ev.lead["Assigned To"]||"unassigned"}</span>
                  </div>
                  <div className="text-slate-500">{fmtWhen(ev.when)} · <b className={ms<30*60000?"text-red-600":""}>{fmtCountdown(ms)}</b></div>
                </div>
              );
            })}
          </div>}
    </div>
  );
}

/* ================== INTERN ================== */
function InternView({user,leads,stats,refresh,notify}){
  const [mode,setMode]=useState("call");
  const mine=useMemo(()=>leads.filter(l=>String(l["Assigned To"]||"").trim().toLowerCase()===String(user).toLowerCase()),[leads,user]);
  const queue=useMemo(()=>mine.filter(l=>!/Booked|Landed|Dumped|Not Interested/i.test(l.Status||"")),[mine]);
  const [idx,setIdx]=useState(0);
  const active=queue[idx];
  useEffect(()=>{ if(idx>=queue.length) setIdx(Math.max(0,queue.length-1)); },[queue.length]);

  const myStats=useMemo(()=>{
    const srv=(stats||{})[user]||{};
    return {assigned:mine.length, dials:srv.dials||0, convos:srv.conversations||0, meetings:srv.meetings||0, followups:srv.followups||0};
  },[mine,stats,user]);

  return (
    <div className="p-4 max-w-2xl mx-auto space-y-4">
      <div className="flex items-center justify-between">
        <StatsBar s={myStats}/>
        <div className="flex gap-1 bg-slate-100 rounded-full p-1">
          <button onClick={()=>setMode("call")} className={"px-3 py-1 rounded-full text-sm "+(mode==="call"?"bg-white shadow":"")}>Call</button>
          <button onClick={()=>setMode("list")} className={"px-3 py-1 rounded-full text-sm "+(mode==="list"?"bg-white shadow":"")}>List</button>
        </div>
      </div>
      <QuickSchedule leads={mine} user={user} refresh={refresh} notify={notify}/>
      {mode==="list"
        ? <InternList mine={mine}/>
        : (queue.length===0
            ? <div className="bg-white rounded-2xl border p-8 text-center text-slate-500">No leads in your queue. 🎉</div>
            : <CallCard key={active.ID} lead={active} user={user} position={idx+1} total={queue.length}
                onPrev={()=>setIdx(Math.max(0,idx-1))} onNext={()=>setIdx(Math.min(queue.length-1,idx+1))}
                onSaved={refresh} notify={notify}/>)}
    </div>
  );
}

function StatsBar({s}){
  const item=(label,v)=>(<div className="text-center"><div className="text-lg font-bold">{v}</div><div className="text-[10px] uppercase text-slate-400">{label}</div></div>);
  return <div className="flex gap-4 bg-white rounded-xl border border-slate-200 px-4 py-2">{item("Queue",s.assigned)}{item("Dials",s.dials)}{item("Convos",s.convos)}{item("Meetings",s.meetings)}{item("Follow",s.followups)}</div>;
}

function InternList({mine}){
  return (
    <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div className="px-4 py-2 text-sm text-slate-500 border-b">{mine.length} assigned to you</div>
      <table className="w-full text-sm">
        <thead className="bg-slate-50 text-slate-500 text-left"><tr>
          <th className="px-3 py-2">#</th><th className="px-3 py-2">Clinic</th><th className="px-3 py-2">City</th><th className="px-3 py-2">Phone</th><th className="px-3 py-2">Status</th></tr></thead>
        <tbody>
          {mine.map((l,i)=>(
            <tr key={l.ID||i} className="border-t border-slate-100">
              <td className="px-3 py-2 text-slate-400">{i+1}</td>
              <td className="px-3 py-2 font-medium">{l.Clinic||l.Name}</td>
              <td className="px-3 py-2">{l.City}</td>
              <td className="px-3 py-2">{l.Phone}</td>
              <td className="px-3 py-2"><StatusBadge status={l.Status}/></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

/* ================== CALL CARD ================== */
function CallCard({lead,user,position,total,onPrev,onNext,onSaved,notify}){
  const [outcome,setOutcome]=useState("");
  const [note,setNote]=useState("");
  const [saving,setSaving]=useState(false);
  const [picker,setPicker]=useState(null);
  const [dt,setDt]=useState({date:todayISO(),time:"11:00"});

  const wa=waNumber(lead.Phone);
  const waMsg=encodeURIComponent("Hi Dr. "+(lead.Name||"")+", I'm reaching out from Reactivify — we build websites for clinics like "+(lead.Clinic||"yours")+". Do you have a couple of minutes to chat?");
  const notesHistory=String(lead.Notes||"").trim();
  const booked=/booked/i.test(lead.Status||"");
  const gcal=booked?gcalUrl(lead):"";

  async function save(extra, opts){
    opts=opts||{};
    setSaving(true);
    const patch={ID:lead.ID};
    const effOutcome = opts.outcome!==undefined ? opts.outcome : outcome;
    if(effOutcome) patch.Status=effOutcome;
    if(note.trim()){ const entry="["+nowStamp()+" · "+user+"] "+note.trim();
      patch.Notes=notesHistory?(notesHistory+"\n"+entry):entry; patch["Last Follow-up Date"]=todayISO(); }
    Object.assign(patch,extra||{});
    const payload={action:"upsert", lead:patch};
    // count this as a logged call outcome (accurate cumulative stats)
    if(effOutcome && !opts.noStat) payload.logStat={intern:user, outcome:effOutcome};
    const res=await apiPost(payload);
    setSaving(false);
    if(res.ok){ notify(opts.msg||"Saved"); onSaved(); if(!opts.stay) onNext(); } else notify("Save failed: "+res.error);
  }
  function confirmPicker(){
    if(picker==="meeting") save({Status:"Meeting Booked","Meeting Date":dt.date,"Meeting Time":dt.time},{outcome:"Meeting Booked"});
    else if(picker==="followup") save({Status:"Schedule Follow-up","Followup Date":dt.date,"Followup Time":dt.time},{outcome:"Schedule Follow-up"});
    setPicker(null);
  }
  function onOutcomeChange(v){ setOutcome(v); if(v==="Meeting Booked") setPicker("meeting"); else if(v==="Schedule Follow-up") setPicker("followup"); }
  function rescheduleMeeting(){ setDt({date:lead["Meeting Date"]||todayISO(), time:lead["Meeting Time"]||"11:00"}); setPicker("meeting"); }
  function cancelMeeting(){
    if(!confirm("Cancel this meeting? It will be removed from the calendar.")) return;
    save({Status:"Interested","Meeting Date":"","Meeting Time":""},{outcome:"", noStat:true, stay:true, msg:"Meeting cancelled"});
  }

  return (
    <div className="bg-white rounded-2xl border border-slate-200 p-5 space-y-4">
      <div className="flex items-center justify-between text-sm text-slate-400">
        <button onClick={onPrev} disabled={position<=1} className="disabled:opacity-30">← Prev</button>
        <span>{position} / {total}</span>
        <button onClick={onNext} disabled={position>=total} className="disabled:opacity-30">Next →</button>
      </div>
      <div>
        <div className="text-xl font-bold">{lead.Clinic||lead.Name}</div>
        {lead.Clinic&&lead.Name && <div className="text-slate-500">Dr. {lead.Name}</div>}
        <div className="text-sm text-slate-500 mt-1 flex flex-wrap gap-x-3">
          {lead.City && <span>📍 {lead.City}</span>}
          {lead.Rating && <span>★ {lead.Rating}</span>}
          {lead.Reviews && <span>{lead.Reviews} reviews</span>}
          {lead["Conflict Flag"]==="true" && <span className="text-red-500">⚠ slot conflict</span>}
        </div>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <a href={"tel:"+digits(lead.Phone)} className="text-center py-3 rounded-xl bg-green-600 text-white font-semibold">📞 Call</a>
        <a href={"https://wa.me/"+wa+"?text="+waMsg} target="_blank" className="text-center py-3 rounded-xl bg-emerald-500 text-white font-semibold">WhatsApp</a>
        <a href={"mailto:"+(lead.Email||"")} className="text-center py-3 rounded-xl bg-slate-600 text-white font-semibold">✉ Email</a>
      </div>
      <div className="text-xs text-slate-400 text-center">{lead.Phone}{lead.Email?" · "+lead.Email:""}</div>

      {booked && lead["Meeting Date"] &&
        <div className="bg-green-50 rounded-xl p-3 text-sm space-y-2">
          <div className="flex items-center justify-between">
            <span>📅 Meeting: <b>{lead["Meeting Date"]} {lead["Meeting Time"]}</b></span>
            {gcal && <a href={gcal} target="_blank" className="px-2 py-1 rounded-lg bg-white border text-xs">Add to Calendar</a>}
          </div>
          <div className="flex gap-2">
            <button onClick={rescheduleMeeting} className="px-2 py-1 rounded-lg bg-white border text-xs">Reschedule</button>
            <button onClick={cancelMeeting} className="px-2 py-1 rounded-lg bg-white border text-xs text-red-600">Cancel meeting</button>
          </div>
        </div>}

      {notesHistory &&
        <div className="bg-slate-50 rounded-xl p-3 max-h-40 overflow-y-auto no-scrollbar">
          <div className="text-xs font-semibold text-slate-400 mb-1">Notes history</div>
          {notesHistory.split("\n").map((line,i)=><div key={i} className="text-sm text-slate-600 mb-1">{line}</div>)}
        </div>}

      <div className="space-y-2">
        <select value={outcome} onChange={e=>onOutcomeChange(e.target.value)} className="w-full border rounded-xl px-3 py-2">
          <option value="">— Select outcome —</option>{OUTCOMES.map(o=><option key={o}>{o}</option>)}</select>
        <textarea value={note} onChange={e=>setNote(e.target.value)} rows={2} placeholder="Add a note (appended, never overwrites)…" className="w-full border rounded-xl px-3 py-2 text-sm"/>
      </div>

      {picker &&
        <div className="bg-indigo-50 rounded-xl p-3 space-y-2">
          <div className="text-sm font-semibold">{picker==="meeting"?"Book meeting":"Schedule follow-up"}</div>
          <div className="flex gap-2">
            <input type="date" value={dt.date} onChange={e=>setDt({...dt,date:e.target.value})} className="border rounded-lg px-2 py-1 text-sm flex-1"/>
            <input type="time" value={dt.time} onChange={e=>setDt({...dt,time:e.target.value})} className="border rounded-lg px-2 py-1 text-sm flex-1"/>
          </div>
          <div className="flex gap-2">
            <button onClick={confirmPicker} className="flex-1 py-2 rounded-lg bg-indigo-600 text-white text-sm">Confirm</button>
            <button onClick={()=>{setPicker(null);setOutcome("");}} className="px-3 py-2 rounded-lg bg-white border text-sm">Cancel</button>
          </div>
        </div>}

      <button onClick={()=>save()} disabled={saving||(!outcome&&!note.trim())} className="w-full py-3 rounded-xl bg-indigo-600 text-white font-semibold disabled:opacity-40">
        {saving?"Saving…":"Save & Next →"}</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
  // Force Babel's CLASSIC JSX runtime (React.createElement) — the automatic
  // runtime emits `import` statements that break as an inline script.
  (function () {
    try {
      var src = document.getElementById("app-code").textContent;
      var out = Babel.transform(src, { presets: [["react", { runtime: "classic" }]] }).code;
      var s = document.createElement("script");
      s.textContent = out;
      document.body.appendChild(s);
    } catch (e) {
      document.getElementById("root").innerHTML =
        '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">App failed to load: ' +
        (e && e.message ? e.message : e) + '</div>';
      console.error(e);
    }
  })();
</script>
